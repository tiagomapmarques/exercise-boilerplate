<!doctype html>
<html lang="en-GB">
  <head>
    <meta charset="UTF-8">
    <title>Exercise boilerplate</title>
    <meta name="description" content="Seed project for a modern React app">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicons/apple-touch-icon.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicons/favicon-32x32.png"
    >
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicons/favicon-16x16.png"
    >
    <link rel="manifest" href="/favicons/site.webmanifest">
    <style>
    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    body {
      margin: 0;
    }

    #document-throbber {
      width: 100%;
      height: 100%;
      position: absolute;
      display: grid;
      align-content: center;
      justify-content: center;
      opacity: 0;
      z-index: -1;
    }

    #document-throbber::after {
      content: "";
      box-sizing: border-box;
      width: 3rem;
      height: 3rem;
      border-radius: 100%;
      border: 0.4rem solid hsl(32, 100%, 50%);
      border-top-color: transparent;
      animation: spin 0.7s infinite linear;
    }

    #document-throbber + #root {
      opacity: 1;
      transition: opacity 0.25s;
    }

    #document-throbber.active {
      opacity: 1;
      transition: opacity 0.25s;
    }

    #document-throbber.active + #root {
      opacity: 0.001; /* Prevents NO_FCP in Lighthouse by forcing a paint */
    }

    noscript {
      font-family: system-ui, sans-serif;
      text-align: center;
    }

    noscript p {
      margin: 1rem 2rem;
    }

    body:has(noscript p) #document-throbber {
      display: none;
    }
    </style>
  </head>

  <body>
    <div id="document-throbber" class="active"></div>
    <div id="root"></div>
    <noscript>
      <p>This application requires JavaScript to be enabled in order to run.</p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
